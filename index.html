<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyMate AI - Login</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.login-box{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    width:300px;
    text-align:center;
}

h1{
    color:#4F46E5;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#4F46E5;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:0.9;
}

p{
    margin-top:15px;
}

a{
    color:#4F46E5;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="login-box">
    <h1>StudyMate AI</h1>

    <input type="email" placeholder="Email">

    <input type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p>
        Don't have an account?
        <a href="signup.html">Sign Up</a>
    </p>
</div>

<script>
function login(){
    window.location.href="dashboard.html";
}
</script>

</body>
</html>
