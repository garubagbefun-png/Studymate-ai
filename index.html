<!DOCTYPE html>
<html>
<head>
    <title>StudyMate AI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            width: 300px;
            text-align: center;
        }

        h1 {
            color: #5a4dfc;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            background: #5a4dfc;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #4638d8;
        }

        #welcome {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login">
        <h1>🎓 StudyMate AI</h1>

        <input type="text" id="username" placeholder="Username">

        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Login</button>
    </div>

    <div id="welcome">
        <h1>Welcome!</h1>
        <p>You have successfully logged in to StudyMate AI.</p>
    </div>
</div>

<script>
function login() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if(username && password){
        document.getElementById("login").style.display = "none";
        document.getElementById("welcome").style.display = "block";
    } else {
        alert("Please enter username and password.");
    }
}
</script>

</body>
</html>
